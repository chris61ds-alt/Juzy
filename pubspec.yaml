name: value_tracker
description: JUZY - Der smarte Value Tracker für bewussten Konsum.
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Sprachunterstützung
  flutter_localizations:
    sdk: flutter
  
  # HIER WAR DER FEHLER: Update auf 0.20.2 nötig
  intl: ^0.20.2

  # Speicherung & Daten
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Design & UI
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  
  # Funktionen
  image_picker: ^1.0.7
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true